services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wackraces
      POSTGRES_PASSWORD: wackraces
      POSTGRES_DB: wackraces
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wackraces -d wackraces"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
  api:
    build: ./api
    env_file: .env
    ports: ["3000:3000"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
  processor:
    build: ./processor
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 80 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
  nginx:
    build: ./nginx
    ports: ["80:80"]
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped
  agents:
    build: ./agents
    env_file: .env
    environment:
      AGENTS_API_BASE_URL: "http://api:3000"
      AGENTS_USE_DOCKER: "false"
      AGENTS_STATUS_PORT: "4000"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports: ["4000:4000"]
    depends_on:
      api:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
volumes:
  pgdata:
