version: '3.8'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wackraces
      POSTGRES_PASSWORD: wackraces
      POSTGRES_DB: wackraces
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  api:
    build: ./api
    env_file: .env.example
    ports: ["3000:3000"]
    depends_on: [db, redis]
  processor:
    build: ./processor
    env_file: .env.example
    depends_on: [db, redis]
volumes:
  pgdata:
